apiVersion: twingate.com/v1beta
kind: TwingateConnector
metadata:
  name: argocd-operator-deployed-connector
  labels:
    app.kubernetes.io/name: operator-deployed-connector
spec:
  # Sets policy to use the image "twingate/connector:latest" and never update it.
  image:
    repository: twingate/connector
    tag: latest
  containerExtra:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
  podExtra: {}
  podLabels: {}
  podAnnotations:
    some/annotation: "gke-connector"
---
apiVersion: twingate.com/v1beta
kind: TwingateConnector
metadata:
  name: auto-updator
  labels:
    app.kubernetes.io/name: auto-updator
spec:
  # Sets policy to check once a day at 00:00 (UTC) for a new version of the image based on
  # the version specifier "^1.0.0". If a new version is found, it will be deployed.
  # Version specifier uses NPM spec: https://github.com/npm/node-semver#ranges
  imagePolicy:
    provider: "dockerhub"
    schedule: "0 0 * * *"
    repository: twingate/connector
    version: "^1.0.0"
  containerExtra:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
  podExtra: {}
  podLabels: {}
  podAnnotations:
    some/annotation: "updator"